# Deploy: Render Dashboard → New → Blueprint → connect this repo
services:
  - type: web
    name: smarthospital-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: OLLAMA_URL
        sync: false
      - key: OLLAMA_MODEL
        value: llama3
      - key: OLLAMA_AUTH_USER
        value: api
      - key: OLLAMA_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
